<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PragmaLens - Analizador de Grice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-10">

    <div class="max-w-4xl w-full px-4">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-indigo-700 tracking-tight">🔎 PragmaLens</h1>
            <p class="text-gray-500 mt-2 text-lg">Analizador de Pragmática y Máximas de Grice mediante IA</p>
        </header>

        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <label for="texto" class="block text-sm font-semibold text-gray-700 mb-2">Ingresa un diálogo o texto a analizar:</label>
            <textarea id="texto" rows="3" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Ej: —¿Te gusta mi vestido nuevo? —Hace un día maravilloso hoy, ¿verdad?"></textarea>
            <button onclick="analizarTexto()" id="btn-analizar" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg transition-colors shadow">
                Analizar Pragmática
            </button>
        </div>

        <div id="loading" class="hidden text-center my-6">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
            <p class="text-gray-500 mt-2">Gemini está analizando las implicaturas...</p>
        </div>

        <div id="resultados" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="contenedor-maximas"></div>

            <div class="bg-amber-50 border-l-4 border-amber-500 rounded-r-xl p-5 shadow-sm">
                <h3 class="text-amber-800 font-bold text-lg mb-1">💡 Implicatura Conversacional</h3>
                <p id="res-implicatura" class="text-amber-900"></p>
            </div>

            <div class="bg-indigo-50 border-l-4 border-indigo-500 rounded-r-xl p-5 shadow-sm">
                <h3 class="text-indigo-800 font-bold text-lg mb-1">🎯 Conclusión Pragmática</h3>
                <p id="res-conclusion" class="text-indigo-950"></p>
            </div>
        </div>
    </div>

    <script>
        async function analizarTexto() {
            const texto = document.getElementById('texto').value;
            const btn = document.getElementById('btn-analizar');
            const loading = document.getElementById('loading');
            const resultados = document.getElementById('resultados');
            
            if(!texto.trim()) return alert("Por favor, escribe algo.");

            loading.classList.remove('hidden');
            resultados.classList.add('hidden');
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/api/analizar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                const data = await response.json();

                if (response.ok) {
                    const contenedor = document.getElementById('contenedor-maximas');
                    contenedor.innerHTML = '';
                    
                    data.analisis_maximas.forEach(m => {
                        let badgeColor = m.estado === 'Cumplida' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                        
                        contenedor.innerHTML += `
                            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                                <div class="flex justify-between items-center mb-2">
                                    <h4 class="font-bold text-gray-800">Máxima de ${m.maxima}</h4>
                                    <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${badgeColor}">${m.estado}</span>
                                </div>
                                <p class="text-sm text-gray-600">${m.explicacion}</p>
                            </div>
                        `;
                    });

                    document.getElementById('res-implicatura').innerText = data.implicatura_conversacional;
                    document.getElementById('res-conclusion').innerText = data.conclusion_pragmatica;
                    
                    resultados.classList.remove('hidden');
                } else {
                    alert("Error en el análisis: " + (data.detail || "Error en el servidor"));
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor backend.");
                console.error(error);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
